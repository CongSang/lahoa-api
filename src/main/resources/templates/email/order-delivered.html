<!DOCTYPE html>
<html lang="vi">
<head>
    <meta http-equiv="Content-Type"
          content="text/html; charset=UTF-8" />
    <meta charset="UTF-8"/>
    <title>Đơn hàng của bạn đã được xác nhận | LA HOA</title>
</head>

<body style="
    margin:0;
    padding:0;
    background:#faf7f8;
    font-family:Arial,sans-serif;
">

<table width="100%"
       cellpadding="0"
       cellspacing="0"
       style="
    width:100%;
    background:#faf7f8;
    padding:24px 0;
">

    <tr>
        <td style="padding:24px 16px">

            <table role="presentation"
                   width="600"
                   cellpadding="0"
                   cellspacing="0"
                   border="0"
                   style="
                width:100%;
                max-width:600px;
                margin:0 auto;
                border-collapse:collapse;
                background:#ffffff;
                overflow:hidden;
">

                <!-- HEADER -->
                <tr>
                    <td>
                        <div th:replace="~{email/fragments/header :: header}"></div>
                    </td>
                </tr>

                <!-- TITLE -->
                <tr>
                    <td style="
    background:#2f2b33;
    padding:16px 24px;
">

                        <h2 style="
    margin:0;
    color:#fff;
    font-size:20px;
    font-weight:600;
">
                            Đơn hàng đã giao thành công
                        </h2>

                    </td>
                </tr>

                <!-- CONTENT -->
                <tr>
                    <td style="
    padding:24px;
    color:#444;
    font-size:14px;
    line-height:1.5
">

                        <p>Xin chào <strong style="color:#9f7a37;" th:text="${name}"></strong>,</p>

                        <p>
                            Bó hoa của bạn đã được giao thành công.
                            Hy vọng món quà này mang đến thật nhiều niềm vui.
                        </p>

                        <div style="
            background:#faf7f8;
            padding:4px 16px;
            border-radius:2px;
            margin:16px 0;
        ">
                            <p><b>Mã đơn:</b> <span th:text="${orderCode}"></span></p>
                            <p><b>Thời gian giao:</b> <span th:text="${deliveredAt}"></span></p>
                        </div>

                        <div style="margin:24px 0;">
                            <a th:href="${reviewLink}"
                               target="_blank"
                               style="
                                   display:inline-block;
                                   background:#9f7a37;
                                   color:white;
                                   padding:10px 30px;
                                   border-radius:2px;
                                   text-decoration:none;
                                   font-weight:600;
                                   font-size:16px;
                                   line-height:20px;
                                   cursor: pointer;">
                                Đánh giá trải nghiệm
                            </a>
                        </div>

                        <p style="color:#6b7280;">
                            Cảm ơn bạn đã tin tưởng LA HOA.
                            Chúng tôi mong sớm được đồng hành cùng bạn lần nữa.
                        </p>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td>
                        <div th:replace="~{email/fragments/footer :: footer}"></div>
                    </td>
                </tr>

            </table>

        </td>
    </tr>

</table>

</body>
</html>
